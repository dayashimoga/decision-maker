<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Decision Maker | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Decision Maker",
    "url": "https://decide.quickutils.top/",
    "description": "Make better decisions with weighted pros/cons analysis, random wheel spinner, and coin flip simulator.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://decide.quickutils.top/">
    <meta name="keywords" content="QuickUtils, decision, maker, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Decision Maker | QuickUtils">
    <meta property="og:description" content="Make better decisions with weighted pros/cons analysis, random wheel spinner, and coin flip simulator.">
    <meta property="og:url" content="https://quickutils.top/decision-maker/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Make better decisions with weighted pros/cons analysis, random wheel spinner, and coin flip simulator.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">🎯 Decision Maker</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">Decision Maker</h1><p class="text-muted">Never be stuck choosing again</p></div>
    <div class="d-flex gap-4" style="flex-wrap:wrap;">
        <div class="glass-card p-4" style="flex:1;min-width:300px;">
            <h3>🎡 Spin the Wheel</h3>
            <canvas id="wheelCanvas" width="350" height="350" style="display:block;margin:1rem auto;"></canvas>
            <input type="text" id="optionInput" class="form-control mb-2" placeholder="Add an option...">
            <div class="d-flex gap-2"><button class="btn btn-secondary" id="addOpt">Add</button><button class="btn btn-primary" id="spinBtn">🎡 SPIN!</button></div>
            <div id="optList" class="mt-3"></div>
        </div>
        <div class="glass-card p-4" style="flex:1;min-width:300px;">
            <h3>🪙 Coin Flip</h3>
            <div id="coinResult" style="font-size:6rem;text-align:center;padding:2rem;">🪙</div>
            <button class="btn btn-primary w-100" id="flipBtn">Flip Coin</button>
            <div class="d-flex justify-content-center gap-4 mt-3"><span>Heads: <strong id="headsCount">0</strong></span><span>Tails: <strong id="tailsCount">0</strong></span></div>
        </div>
    </div>
    </main>
    <footer class="footer"><div class="container copyright text-center py-4">© 2026 QuickUtils. All rights reserved.</div></footer>
    <script src="quickutils-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
